; PlatformIO Project Configuration File
;
; Firmware único — un solo binario para todos los nodos.
; El rol se configura en runtime via dashboard web (http://192.168.4.1).
;
; Compilar y flashear:
;   pio run --target upload
;   pio run --target upload --upload-port /dev/ttyACM0
;
; Monitor serial:
;   pio device monitor
;   pio device monitor --port /dev/ttyACM0 --baud 115200

[env:agroxiao]
platform  = espressif32
board     = seeed_xiao_esp32s3
framework = arduino
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
monitor_port    = /dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_1C:DB:D4:5A:A1:10-if00
upload_port     = /dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_1C:DB:D4:5A:A1:10-if00

lib_deps =
    jgromes/RadioLib @ ^7.1.2
    adafruit/Adafruit AHTX0 @ ^2.0.5
    adafruit/Adafruit SHT31 Library @ ^2.2.2
    adafruit/Adafruit BusIO @ ^1.16.1

; WiFi y WebServer son parte del framework ESP32 Arduino (sin deps extra)
