; PlatformIO Project Configuration File
;
; Dos entornos: gateway (nodo base con PC) y remote (nodo de campo)
;
; Compilar:  pio run -e gateway   /   pio run -e remote
; Flashear:  pio run -e gateway --target upload
;            pio run -e remote  --target upload
; Monitor:   pio device monitor  (usa puerto y baud del entorno activo)

[common]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
monitor_port = /dev/ttyACM0
upload_port = /dev/ttyACM0
lib_deps =
    jgromes/RadioLib @ ^7.1.2

[env:gateway]
extends = common
build_flags = -DLORA_NODE_GATEWAY=1

[env:remote]
extends = common
build_flags = -DLORA_NODE_GATEWAY=0
